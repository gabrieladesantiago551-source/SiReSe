# Server
server.port=8080

# ---- Base de datos MySQL ----
spring.datasource.url=jdbc:mysql://127.0.0.1:3307/sirese_db?useSSL=false&serverTimezone=America/Mexico_City&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---- Correo (JavaMail) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=tu_correo@gmail.com
spring.mail.password=tu_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Correo del administrador receptor de notificaciones
sirese.admin.email=admin@upiiz.ipn.mx

# ---- CORS ----
sirese.cors.allowed-origins=http://localhost:3000,https://tu-app.onrender.com